<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Trapy - Ride Together, Save Together | India's Trusted Carpooling</title>
    <meta name="description" content="Trapy is India's trusted carpooling platform. Share rides, split costs, and travel comfortably. Verified drivers, secure payments, and women-only options." />
    <meta name="author" content="Trapy" />
    <meta name="keywords" content="carpooling, ride sharing, carpool India, Mumbai Pune rides, BlaBlaCar alternative" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4F46E5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Trapy" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/trapy-logo.png" />
    <link rel="icon" type="image/png" href="/trapy-logo.png" />

    <meta property="og:title" content="Trapy - Ride Together, Save Together" />
    <meta property="og:description" content="India's trusted carpooling platform. Share rides, split costs, and travel comfortably." />
    <meta property="og:type" content="website" />
  <meta property="og:image" content="/trapy-logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Trapy" />
  <meta name="twitter:image" content="/trapy-logo.png" />
    
    <link rel="canonical" href="https://trapy.in" />
  </head>

  <body>
    <div id="root">
      <!-- Loading fallback - shown until React mounts -->
      <div id="app-loading" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f5;font-family:system-ui,sans-serif;">
        <div style="text-align:center;">
          <div style="width:60px;height:60px;border:4px solid #e5e5e5;border-top-color:#4F46E5;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div>
          <p style="color:#666;margin:0;">Loading Trapy...</p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      // Error handler for debugging white screen issues
      window.onerror = function(msg, url, line, col, error) {
        console.error('Global error:', msg, url, line, col, error);
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding:40px;text-align:center;font-family:system-ui,sans-serif;">' +
            '<h1 style="color:#dc2626;">Something went wrong</h1>' +
            '<p style="color:#666;">' + msg + '</p>' +
            '<p style="color:#999;font-size:12px;">at ' + url + ':' + line + '</p>' +
            '<button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#4F46E5;color:white;border:none;border-radius:8px;cursor:pointer;">Reload</button>' +
            '</div>';
        }
        return false;
      };
      
      // Handle unhandled promise rejections
      window.onunhandledrejection = function(event) {
        console.error('Unhandled promise rejection:', event.reason);
        var root = document.getElementById('root');
        var loading = document.getElementById('app-loading');
        // Only show error if app is still loading (React hasn't mounted)
        if (root && loading) {
          root.innerHTML = '<div style="padding:40px;text-align:center;font-family:system-ui,sans-serif;">' +
            '<h1 style="color:#dc2626;">Failed to load app</h1>' +
            '<p style="color:#666;">' + (event.reason?.message || event.reason || 'Unknown error') + '</p>' +
            '<button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#4F46E5;color:white;border:none;border-radius:8px;cursor:pointer;">Reload</button>' +
            '</div>';
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
